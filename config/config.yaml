defaults:
  - procesos: entrenamiento
  - _self_

hydra:
  run:
    dir: experimentos/procesos/${procesos.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}

  sweep:
    dir: experimentos/procesos/${procesos.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

  job:
    chdir: true

  job_logging:
    root:
      level: INFO
      handlers: [console, file]